<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Kernelrw's Repo</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none; /* optional, smoother glass feel */
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'SF Pro Display', 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: radial-gradient(circle at 20% 30%, #0a0f1f, #03060f);
            min-height: 100vh;
            color: #ffffff;
            overflow-x: hidden;
            perspective: 1800px;
            transform-style: preserve-3d;
        }

        /* 🔮 Advanced Liquid Glass + Apple Frosted Glass with realistic blur & reflect */
        .glass-panel {
            background: rgba(20, 28, 40, 0.38);
            backdrop-filter: blur(28px) saturate(180%);
            -webkit-backdrop-filter: blur(28px) saturate(180%);
            border-radius: 48px;
            border: 1px solid rgba(255, 255, 255, 0.25);
            box-shadow: 0 25px 45px -12px rgba(0, 0, 0, 0.4), inset 0 1px 0 0 rgba(255, 255, 255, 0.2);
            transition: all 0.4s cubic-bezier(0.2, 0.9, 0.4, 1.1);
        }

        /* dynamic glossy highlight (liquid shimmer) */
        .glass-panel::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: inherit;
            padding: 2px;
            background: linear-gradient(125deg, 
                rgba(255, 255, 255, 0.5) 0%, 
                rgba(255, 255, 255, 0.05) 40%,
                rgba(255, 255, 255, 0.2) 60%,
                transparent 90%);
            mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            pointer-events: none;
        }

        /* 3D global container */
        .container {
            max-width: 860px;
            margin: 0 auto;
            padding: 2rem 1.5rem;
            transform-style: preserve-3d;
            position: relative;
            z-index: 5;
        }

        /* Hero card — extreme 3D with liquid glass depth */
        .hero {
            position: relative;
            text-align: center;
            padding: 3rem 2rem 3rem 2rem;
            background: rgba(30, 38, 58, 0.4);
            backdrop-filter: blur(35px) saturate(200%);
            -webkit-backdrop-filter: blur(35px) saturate(200%);
            border-radius: 64px;
            border: 1px solid rgba(110, 170, 255, 0.45);
            box-shadow: 
                0 40px 70px -20px rgba(0, 0, 0, 0.6),
                0 0 0 1px rgba(255, 255, 255, 0.12) inset,
                0 8px 20px rgba(0, 150, 255, 0.2);
            transform: translateZ(20px) rotateX(2.5deg) rotateY(-1.2deg);
            transition: transform 0.5s ease, box-shadow 0.4s ease;
            animation: cardFloatGlow 6s infinite alternate ease-in-out;
            transform-style: preserve-3d;
            overflow: hidden;
        }

        /* Real glowing aura (multi-layered) */
        .hero::after {
            content: '';
            position: absolute;
            inset: -8px;
            background: radial-gradient(ellipse at 50% 30%, rgba(80, 160, 255, 0.5), rgba(30, 80, 200, 0) 70%);
            filter: blur(32px);
            z-index: -2;
            opacity: 0.7;
            border-radius: 70px;
            transform: translateZ(-20px);
            transition: opacity 0.8s;
        }

        .hero:hover {
            transform: translateZ(35px) rotateX(1.2deg) rotateY(0.8deg) scale(1.01);
            box-shadow: 
                0 55px 85px -18px rgba(0, 150, 255, 0.5),
                0 0 0 1.5px rgba(130, 200, 255, 0.6) inset,
                0 15px 35px rgba(0, 0, 0, 0.4);
            border-color: rgba(100, 180, 255, 0.7);
        }

        .hero:hover::after {
            opacity: 1;
            filter: blur(45px);
            background: radial-gradient(ellipse at 50% 30%, rgba(70, 180, 255, 0.8), rgba(40, 100, 240, 0.2) 75%);
        }

        @keyframes cardFloatGlow {
            0% {
                transform: translateZ(18px) rotateX(2deg) rotateY(-1deg);
                box-shadow: 0 30px 60px -15px rgba(0, 120, 255, 0.3);
            }
            100% {
                transform: translateZ(28px) rotateX(1.8deg) rotateY(0.5deg);
                box-shadow: 0 45px 75px -10px rgba(60, 160, 255, 0.5);
            }
        }

        /* 3D liquid glass icon — reflective + depth */
        .icon {
            width: 115px;
            height: 115px;
            margin: 0 auto 1.6rem;
            border-radius: 30px;
            transform-style: preserve-3d;
            transform: translateZ(45px) rotate(0deg);
            transition: transform 0.35s cubic-bezier(0.2, 0.9, 0.4, 1.2);
            position: relative;
            box-shadow: 0 20px 40px -8px rgba(0,0,0,0.5), 0 0 0 3px rgba(255,255,240,0.2) inset, 0 0 0 1px rgba(255,255,255,0.5);
            background: linear-gradient(145deg, rgba(30,50,80,0.5), rgba(20,30,55,0.8));
            backdrop-filter: blur(12px);
            overflow: hidden;
        }

        .icon img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 28px;
            mix-blend-mode: normal;
            filter: brightness(1.05) contrast(1.1);
        }

        /* Glossy reflection layer for liquid effect */
        .icon::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border-radius: 28px;
            background: linear-gradient(135deg, rgba(255,255,245,0.6) 0%, rgba(255,255,255,0) 50%, rgba(200,220,255,0.2) 100%);
            pointer-events: none;
            z-index: 2;
        }

        .icon::after {
            content: '';
            position: absolute;
            inset: -5px;
            background: radial-gradient(circle at 30% 25%, rgba(80,180,255,0.6), rgba(0,0,0,0) 70%);
            filter: blur(16px);
            z-index: -1;
            border-radius: 35px;
            opacity: 0.9;
        }

        .icon:hover {
            transform: translateZ(65px) scale(1.03) rotate(1deg);
        }

        h1 {
            font-size: 2.9rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            background: linear-gradient(125deg, #FFFFFF, #9ac9ff, #3f8eff, #b5dcff);
            background-size: 200% auto;
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 0 5px 25px rgba(0, 110, 255, 0.4);
            transform: translateZ(25px);
            margin-bottom: 0.4rem;
            animation: textShimmer 8s linear infinite;
        }

        @keyframes textShimmer {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .subtitle {
            font-size: 1.2rem;
            font-weight: 500;
            color: rgba(200, 220, 250, 0.9);
            backdrop-filter: blur(4px);
            background: rgba(255,255,255,0.05);
            display: inline-block;
            padding: 0.35rem 1.2rem;
            border-radius: 40px;
            transform: translateZ(18px);
            letter-spacing: 0.3px;
            border: 0.5px solid rgba(100, 180, 255, 0.5);
            margin-bottom: 2rem;
        }

        /* Glassmorphic buttons with liquid metallic flow */
        .repo-links {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            max-width: 440px;
            margin: 0 auto;
            transform-style: preserve-3d;
        }

        .btn {
            position: relative;
            padding: 1rem 1.2rem;
            border-radius: 28px;
            font-weight: 600;
            font-size: 1.05rem;
            text-decoration: none;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.9rem;
            backdrop-filter: blur(20px) saturate(180%);
            background: rgba(25, 35, 55, 0.55);
            border: 1px solid rgba(255, 255, 255, 0.25);
            box-shadow: 0 8px 20px -5px rgba(0, 0, 0, 0.3), 0 0 0 0.5px rgba(255,255,220,0.3) inset;
            transition: all 0.4s cubic-bezier(0.2, 0.9, 0.5, 1.2);
            transform: translateZ(8px);
            overflow: hidden;
            color: #f0f4ff;
        }

        /* Liquid glow underline effect (apple style) */
        .btn::before {
            content: '';
            position: absolute;
            bottom: 0;
            left: 5%;
            width: 90%;
            height: 2px;
            background: linear-gradient(90deg, transparent, rgba(80, 180, 255, 0.9), rgba(200, 230, 255, 0.9), rgba(80, 180, 255, 0.7), transparent);
            filter: blur(4px);
            transform: scaleX(0);
            transition: transform 0.3s ease;
            border-radius: 4px;
        }

        .btn:hover::before {
            transform: scaleX(1);
        }

        .btn::after {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at var(--x, 50%) var(--y, 50%), rgba(80, 160, 255, 0.2), transparent 80%);
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
            border-radius: inherit;
        }

        .btn:hover {
            transform: translateZ(26px) translateY(-4px);
            background: rgba(35, 55, 85, 0.7);
            border-color: rgba(100, 190, 255, 0.6);
            box-shadow: 0 20px 35px -12px rgba(0, 120, 255, 0.5), 0 0 0 1px rgba(200, 230, 255, 0.6) inset;
        }

        .btn:hover::after {
            opacity: 1;
        }

        /* individual brand colors enhanced with luminosity */
        .btn-cydia {
            background: rgba(200, 100, 40, 0.3);
            border-color: rgba(255, 140, 70, 0.55);
        }
        .btn-cydia:hover {
            background: rgba(210, 110, 50, 0.55);
            box-shadow: 0 20px 35px -10px rgba(255, 100, 30, 0.6);
        }
        .btn-saily {
            background: rgba(70, 200, 110, 0.28);
            border-color: rgba(80, 230, 130, 0.55);
        }
        .btn-saily:hover {
            background: rgba(80, 220, 120, 0.5);
            box-shadow: 0 20px 35px -10px rgba(70, 220, 100, 0.55);
        }
        .btn-sileo {
            background: rgba(170, 80, 220, 0.3);
            border-color: rgba(190, 110, 255, 0.5);
        }
        .btn-sileo:hover {
            background: rgba(190, 90, 240, 0.55);
            box-shadow: 0 20px 35px -10px rgba(170, 80, 255, 0.6);
        }
        .btn-zebra {
            background: rgba(255, 180, 50, 0.28);
            border-color: rgba(255, 190, 80, 0.6);
        }
        .btn-zebra:hover {
            background: rgba(255, 190, 70, 0.55);
            box-shadow: 0 20px 35px -10px rgba(255, 160, 30, 0.6);
        }

        .btn-icon {
            width: 42px;
            height: 42px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 14px;
            overflow: hidden;
            background: rgba(0, 0, 0, 0.2);
            backdrop-filter: blur(4px);
            transform: translateZ(6px);
            transition: transform 0.2s;
        }

        .btn-icon img {
            width: 42px;
            height: 42px;
            border-radius: 12px;
            object-fit: cover;
        }

        .btn:hover .btn-icon {
            transform: translateZ(12px) scale(1.02);
        }

        /* footer liquid glass */
        footer {
            text-align: center;
            margin-top: 3rem;
            padding: 1rem;
            background: rgba(15, 25, 45, 0.35);
            backdrop-filter: blur(25px);
            border-radius: 60px;
            width: fit-content;
            margin-left: auto;
            margin-right: auto;
            border: 0.5px solid rgba(255,255,210,0.2);
            transform: translateZ(6px);
            font-size: 0.85rem;
            color: #9ab3dd;
        }

        /* glowing orbs + 3D floating particles with neon tails */
        .glow-orb {
            position: fixed;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(0, 150, 255, 0.35), rgba(0, 40, 100, 0) 70%);
            border-radius: 50%;
            filter: blur(70px);
            pointer-events: none;
            z-index: 0;
            animation: orbFloat 14s infinite alternate ease-in-out;
            transform-style: preserve-3d;
        }

        @keyframes orbFloat {
            0% { transform: translate(-10%, -20%) translateZ(-80px) scale(1); opacity: 0.5; }
            100% { transform: translate(15%, 15%) translateZ(120px) scale(1.3); opacity: 0.9; }
        }

        /* liquid glass droplets */
        .droplet {
            position: fixed;
            background: radial-gradient(circle at 30% 25%, rgba(255,255,245,0.5), rgba(80,160,255,0.1));
            backdrop-filter: blur(30px);
            border-radius: 60% 40% 50% 50% / 45% 50% 50% 55%;
            width: 140px;
            height: 140px;
            filter: blur(8px);
            pointer-events: none;
            z-index: 0;
            animation: liquidShift 20s infinite alternate;
        }

        @keyframes liquidShift {
            0% { border-radius: 60% 40% 50% 50% / 45% 50% 50% 55%; transform: translate(0, 0) rotate(0deg); opacity: 0.3;}
            100% { border-radius: 40% 60% 30% 70% / 55% 45% 65% 35%; transform: translate(30px, -20px) rotate(12deg); opacity: 0.55;}
        }

        /* 3D interactive mouse tilt effect */
        .tilt-sensitive {
            transition: transform 0.1s linear;
            transform-style: preserve-3d;
        }

        @media (max-width: 780px) {
            .hero { padding: 2rem 1rem; border-radius: 48px;}
            h1 { font-size: 2rem; }
            .icon { width: 90px; height: 90px; }
            .btn { padding: 0.75rem 1rem; font-size: 0.9rem; }
            .btn-icon, .btn-icon img { width: 34px; height: 34px; }
        }
    </style>
</head>
<body>

    <!-- Ambient dynamic glowing 3D elements -->
    <div class="glow-orb" style="top: -100px; left: -80px;"></div>
    <div class="glow-orb" style="bottom: -80px; right: -50px; width: 500px; height: 500px; background: radial-gradient(circle, rgba(80, 70, 220, 0.4), transparent 70%); animation-duration: 19s;"></div>
    <div class="droplet" style="top: 15%; left: 5%;"></div>
    <div class="droplet" style="bottom: 10%; right: 8%; width: 180px; height: 180px; animation-duration: 25s;"></div>
    <div class="droplet" style="top: 40%; right: 15%; width: 100px; height: 100px; animation-duration: 18s;"></div>

    <div class="container">
        <div class="hero" id="heroCard">
            <div class="icon" id="icon3d">
                <img src="https://raw.githubusercontent.com/kernelrw/kernelrw.github.io/main/CydiaIcon.png" alt="Kernelrw's Repo Icon" loading="eager">
            </div>
            <h1>Kernelrw's Repo</h1>
            <div class="subtitle">arm | arm64 | arm64e</div>
            
            <div class="repo-links">
                <!-- Cydia -->
                <a class="btn btn-cydia" href="cydia://url/https://cydia.saurik.com/api/share#?source=kernelrw.github.io/">
                    <span class="btn-icon"><img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcT9gFkZoGn9-eMwEMK2yH1_xJDmiJ8AtxG4nqVTuwyuFg&s" alt="Cydia"></span>
                    Add to Cydia
                </a>
                <!-- Saily -->
                <a class="btn btn-saily" href="apt-repo://https://kernelrw.github.io/">
                    <span class="btn-icon"><img src="https://raw.githubusercontent.com/Lakr233/Saily/main-rootless-3.0/Application/Chromatic/AppIconTransparent.png" alt="Saily"></span>
                    Add to Saily
                </a>
                <!-- Sileo -->
                <a class="btn btn-sileo" href="sileo://source/https://kernelrw.github.io/">
                    <span class="btn-icon"><img src="https://getsileo.app/img/icon.png" alt="Sileo"></span>
                    Add to Sileo
                </a>
                <!-- Zebra -->
                <a class="btn btn-zebra" href="zbra://sources/add/https://kernelrw.github.io/">
                    <span class="btn-icon"><img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRpyNWRkY6emI1wYauYvXvu6it9oAT-Nldh_098_9vFdw&s=10" alt="Zebra"></span>
                    Add to Zebra
                </a>
            </div>
        </div>
        <footer>
            <p>© 2026 Kernelrw</p>
        </footer>
    </div>

    <!-- Real-time mouse tracking for liquid 3D parallax (Apple-like depth) -->
    <script>
        (function() {
            const hero = document.getElementById('heroCard');
            const icon = document.getElementById('icon3d');
            const btns = document.querySelectorAll('.btn');
            
            // Global 3D tilt effect on hero card based on mouse position
            document.body.addEventListener('mousemove', (e) => {
                if (!hero) return;
                const rect = hero.getBoundingClientRect();
                const centerX = rect.left + rect.width / 2;
                const centerY = rect.top + rect.height / 2;
                const mouseX = e.clientX - centerX;
                const mouseY = e.clientY - centerY;
                const maxRotate = 8;
                const rotateY = (mouseX / (rect.width / 2)) * maxRotate * 0.7;
                const rotateX = -(mouseY / (rect.height / 2)) * maxRotate * 0.5;
                
                // Smoothing transform with 3D preserve
                hero.style.transform = `perspective(1200px) translateZ(28px) rotateX(${rotateX * 0.6}deg) rotateY(${rotateY * 0.6}deg)`;
                
                // Icon independent depth shifting
                if(icon) {
                    const iconShiftX = (mouseX / window.innerWidth) * 12;
                    const iconShiftY = (mouseY / window.innerHeight) * 8;
                    icon.style.transform = `translateZ(${45 + Math.abs(mouseX)*0.03}px) rotateX(${rotateX * 0.2}deg) rotateY(${rotateY * 0.2}deg) translateX(${iconShiftX * 0.3}px) translateY(${iconShiftY * 0.3}px)`;
                }
                
                // Dynamic button micro-glow based on cursor distance
                btns.forEach(btn => {
                    const btnRect = btn.getBoundingClientRect();
                    const dx = e.clientX - (btnRect.left + btnRect.width/2);
                    const dy = e.clientY - (btnRect.top + btnRect.height/2);
                    const distance = Math.sqrt(dx*dx + dy*dy);
                    const maxDist = 180;
                    const intensity = Math.max(0, 1 - (distance / maxDist));
                    if (intensity > 0.2) {
                        btn.style.setProperty('--x', `${(dx / btnRect.width) * 100 + 50}%`);
                        btn.style.setProperty('--y', `${(dy / btnRect.height) * 100 + 50}%`);
                        btn.style.boxShadow = `0 20px 32px -12px rgba(0, 150, 255, ${0.35 + intensity * 0.3}), 0 0 0 1px rgba(255,255,210,0.5) inset`;
                    } else {
                        btn.style.boxShadow = '';
                    }
                });
            });
            
            document.body.addEventListener('mouseleave', () => {
                if(hero) hero.style.transform = `perspective(1200px) translateZ(20px) rotateX(2deg) rotateY(-1deg)`;
                if(icon) icon.style.transform = `translateZ(45px) rotateX(0deg) rotateY(0deg)`;
                btns.forEach(btn => btn.style.boxShadow = '');
            });
            
            // Liquid effect: add ripple effect on button clicks (Apple Haptics style)
            btns.forEach(btn => {
                btn.addEventListener('click', (e) => {
                    const ripple = document.createElement('span');
                    ripple.style.position = 'absolute';
                    ripple.style.borderRadius = '50%';
                    ripple.style.width = '80px';
                    ripple.style.height = '80px';
                    ripple.style.background = 'radial-gradient(circle, rgba(255,255,255,0.7), rgba(80,180,255,0) 70%)';
                    ripple.style.transform = 'translate(-50%, -50%) scale(0)';
                    ripple.style.left = `${e.clientX - btn.getBoundingClientRect().left}px`;
                    ripple.style.top = `${e.clientY - btn.getBoundingClientRect().top}px`;
                    ripple.style.pointerEvents = 'none';
                    ripple.style.zIndex = '20';
                    ripple.style.transition = 'transform 0.5s ease-out, opacity 0.5s';
                    ripple.style.opacity = '1';
                    btn.style.overflow = 'hidden';
                    btn.appendChild(ripple);
                    requestAnimationFrame(() => {
                        ripple.style.transform = 'translate(-50%, -50%) scale(4)';
                        ripple.style.opacity = '0';
                    });
                    setTimeout(() => ripple.remove(), 600);
                });
            });

            // add pseudo liquid glass shine animation that sweeps across hero occasionally
            let angle = 0;
            setInterval(() => {
                if(hero) {
                    const shine = document.createElement('div');
                    shine.style.position = 'absolute';
                    shine.style.top = '-50%';
                    shine.style.left = '-50%';
                    shine.style.width = '200%';
                    shine.style.height = '200%';
                    shine.style.background = 'linear-gradient(115deg, transparent 30%, rgba(255,255,255,0.25) 45%, rgba(255,255,245,0.1) 55%, transparent 70%)';
                    shine.style.transform = `rotate(${angle}deg) translateX(-30%)`;
                    shine.style.pointerEvents = 'none';
                    shine.style.zIndex = '3';
                    shine.style.transition = 'transform 0.6s ease';
                    hero.style.position = 'relative';
                    hero.appendChild(shine);
                    setTimeout(() => {
                        shine.style.transform = `rotate(${angle}deg) translateX(130%)`;
                        setTimeout(() => shine.remove(), 700);
                    }, 50);
                    angle = (angle + 37) % 360;
                }
            }, 8000);
        })();
    </script>
</body>
</html>
